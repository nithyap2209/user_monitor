<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — Access Denied — User Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="h-full bg-gray-50">
    <div class="min-h-full flex flex-col items-center justify-center px-6 py-12">
        <div class="text-center max-w-md">
            <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-lock text-3xl text-red-500"></i>
            </div>
            <p class="text-sm font-semibold text-red-600 mb-2">403</p>
            <h1 class="text-3xl font-bold text-gray-900 mb-3">Access Denied</h1>
            <p class="text-gray-500 mb-8">You don't have permission to access this page.</p>
            <a href="{{ url_for('dashboard.index') }}"
               class="inline-flex items-center px-5 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
                <i class="fas fa-arrow-left mr-2"></i> Go to Dashboard
            </a>
        </div>
        <p class="mt-16 text-xs text-gray-400">
            <i class="fas fa-chart-line text-indigo-400 mr-1"></i> User Monitor
        </p>
    </div>
</body>
</html>
