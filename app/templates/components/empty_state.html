<div class="flex flex-col items-center justify-center py-16 text-center">
    <div class="w-16 h-16 rounded-full bg-gray-100 flex items-center justify-center mb-4">
        <i class="fas fa-{{ icon | default('inbox') }} text-2xl text-gray-400"></i>
    </div>
    <h3 class="text-lg font-semibold text-gray-700 mb-1">{{ title | default('Nothing here yet') }}</h3>
    <p class="text-sm text-gray-500 max-w-sm">{{ message | default('Data will appear here once available.') }}</p>
</div>
