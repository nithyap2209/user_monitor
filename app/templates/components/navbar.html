<header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-6 flex-shrink-0">
    <div class="flex items-center gap-3">
        <button id="sidebar-toggle" type="button" title="Open menu"
                class="md:hidden p-2 -ml-1 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition flex-shrink-0">
            <i class="fas fa-bars text-lg"></i>
        </button>
        <h1 class="text-lg font-semibold text-gray-800 truncate">{% block page_title %}{% endblock %}</h1>
    </div>
    <div class="flex items-center gap-4">
        {% if current_user.company %}
        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-100">
            <i class="fas fa-building mr-1.5 text-indigo-400"></i>
            {{ current_user.company.name }}
        </span>
        {% endif %}
        <a href="{{ url_for('auth.logout') }}"
           class="inline-flex items-center px-3 py-1.5 text-sm text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition-colors duration-150">
            <i class="fas fa-sign-out-alt mr-1.5"></i>
            Logout
        </a>
    </div>
</header>
