{% extends 'auth/auth_base.html' %}
{% block title %}Reset Password — User Monitor{% endblock %}

{% block auth_form %}
<div class="bg-white rounded-2xl shadow-sm border p-8">
    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-indigo-50 mb-3">
            <i class="fas fa-lock-open text-indigo-600 text-xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Set new password</h2>
        <p class="text-sm text-gray-500 mt-1">Choose a strong password for your account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-4 form-field-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fas fa-lock"></i>
                </span>
                <input type="password" name="password" id="resetPassword" required minlength="6"
                       class="w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                       placeholder="••••••••">
                <button type="button" title="Toggle password visibility" onclick="togglePassword('resetPassword', this)" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 transition">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="mb-6 form-field-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fas fa-lock"></i>
                </span>
                <input type="password" name="confirm_password" id="resetConfirmPassword" required
                       class="w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                       placeholder="••••••••">
                <button type="button" title="Toggle password visibility" onclick="togglePassword('resetConfirmPassword', this)" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 transition">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 auth-btn">
            Reset Password
        </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500 auth-footer">
        <a href="{{ url_for('auth.login') }}" class="text-indigo-600 font-medium hover:underline">
            <i class="fas fa-arrow-left mr-1 text-xs"></i> Back to login
        </a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword(inputId, btn) {
    var input = document.getElementById(inputId);
    var icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
