{% extends 'auth/auth_base.html' %}
{% block title %}Login — User Monitor{% endblock %}

{% block auth_form %}
<div class="bg-white rounded-2xl shadow-sm border p-8">
    <h2 class="text-2xl font-bold text-gray-800">Welcome back</h2>
    <p class="text-sm text-gray-500 mt-1 mb-6">Sign in to your account to continue</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-4 form-field-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fas fa-envelope"></i>
                </span>
                <input type="email" name="email" required
                       class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                       placeholder="you@company.com">
            </div>
        </div>

        <div class="mb-4 form-field-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fas fa-lock"></i>
                </span>
                <input type="password" name="password" id="loginPassword" required
                       class="w-full pl-10 pr-10 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                       placeholder="••••••••">
                <button type="button" title="Toggle password visibility" onclick="togglePassword('loginPassword', this)" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 transition">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="flex items-center justify-between mb-6 form-field-3">
            <label class="flex items-center text-sm text-gray-600">
                <input type="checkbox" name="remember" class="mr-2 rounded border-gray-300 text-indigo-500 focus:ring-indigo-500">
                Remember me
            </label>
            <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-indigo-600 hover:underline">Forgot password?</a>
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 auth-btn">
            Sign In
        </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500 auth-footer">
        Don't have an account?
        <a href="{{ url_for('auth.signup') }}" class="text-indigo-600 font-medium hover:underline">Sign up</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword(inputId, btn) {
    var input = document.getElementById(inputId);
    var icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
