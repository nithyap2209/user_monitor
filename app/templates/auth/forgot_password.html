{% extends 'auth/auth_base.html' %}
{% block title %}Forgot Password — User Monitor{% endblock %}

{% block auth_form %}
<div class="bg-white rounded-2xl shadow-sm border p-8">
    <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-indigo-50 mb-3">
            <i class="fas fa-key text-indigo-600 text-xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Forgot your password?</h2>
        <p class="text-sm text-gray-500 mt-1">Enter your email and we'll send you a reset link</p>
    </div>

    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-6 form-field-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fas fa-envelope"></i>
                </span>
                <input type="email" name="email" required
                       class="w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                       placeholder="you@company.com">
            </div>
        </div>

        <button type="submit"
                class="w-full py-2.5 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 auth-btn">
            Send Reset Link
        </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-500 auth-footer">
        <a href="{{ url_for('auth.login') }}" class="text-indigo-600 font-medium hover:underline">
            <i class="fas fa-arrow-left mr-1 text-xs"></i> Back to login
        </a>
    </p>
</div>
{% endblock %}
